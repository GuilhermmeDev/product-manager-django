{% extends 'base.html' %}

{% block title %}Deletar Categoria - CRM{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-semibold text-gray-900">Confirmar exclusão</h1>
        <p class="text-gray-600 text-sm mt-2">Tem certeza que deseja deletar esta categoria?</p>
    </div>

    <div class="border border-red-200 bg-red-50 rounded-lg p-6 mb-8">
        <p class="text-red-800 font-medium mb-2">Categoria a ser deletada:</p>
        <p class="text-red-700">{{ object.name }}</p>
    </div>

    <div class="flex gap-3">
        <a href="/categories/" class="px-6 py-2 border border-gray-300 text-gray-900 rounded-lg hover:bg-gray-50 font-medium text-sm transition">
            Cancelar
        </a>
        <form method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium text-sm transition">
                Deletar
            </button>
        </form>
    </div>
</div>
{% endblock %}
