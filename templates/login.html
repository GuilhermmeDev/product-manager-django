<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">

<form method="post" class="bg-white p-8 rounded shadow w-96">
    {% csrf_token %}
    <h1 class="text-2xl font-bold mb-4 text-center">Login</h1>

    <div class="mb-4">
        <label class="block mb-1">Usuário</label>
        <input type="text" name="username" class="w-full border p-2 rounded">
    </div>

    <div class="mb-4">
        <label class="block mb-1">Senha</label>
        <input type="password" name="password" class="w-full border p-2 rounded">
    </div>

    <button class="bg-blue-500 text-white w-full py-2 rounded mt-4">
        Login
    </button>
</form>

</body>
</html>
