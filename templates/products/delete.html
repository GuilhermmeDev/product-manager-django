{% extends 'base.html' %}

{% block title %}Deletar Produto — FlowCRM{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Confirmar exclusão</h1>
        <p>Tem certeza que deseja excluir este produto? Esta ação não poderá ser revertida.</p>
    </div>
</div>

<div class="form-card">
    <div class="form-group">
        <label class="form-label">Produto</label>
        <div class="badge">{{ object.name }} — R$ {{ object.price }}</div>
    </div>

    <div class="form-footer" style="justify-content: flex-start; gap: 0.75rem; margin-top: 0;">
        <a href="/products/" class="btn-secondary">Cancelar</a>
        <form method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Deletar produto</button>
        </form>
    </div>
</div>
{% endblock %}
