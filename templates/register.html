<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-10">
            <h1 class="text-2xl font-semibold text-gray-900 mb-2">CRM System</h1>
            <p class="text-gray-600 text-sm">Criar Conta</p>
        </div>

        <!-- Error Messages -->
        {% if form.errors %}
            <div class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
                <p class="text-red-800 text-sm font-medium">Verifique os erros abaixo</p>
            </div>
        {% endif %}

        <!-- Form -->
        <form method="post" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-900 mb-1">
                    Usuário
                </label>
                <input
                    type="text"
                    name="username"
                    placeholder="Escolha um nome de usuário"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    required
                >
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-900 mb-1">
                    Email
                </label>
                <input
                    type="email"
                    name="email"
                    placeholder="seu@email.com"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    required
                >
            </div>

            <!-- First Name -->
            <div>
                <label class="block text-sm font-medium text-gray-900 mb-1">
                    Nome
                </label>
                <input
                    type="text"
                    name="first_name"
                    placeholder="Seu primeiro nome"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    required
                >
            </div>

            <!-- Last Name -->
            <div>
                <label class="block text-sm font-medium text-gray-900 mb-1">
                    Sobrenome
                </label>
                <input
                    type="text"
                    name="last_name"
                    placeholder="Seu sobrenome"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    required
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-900 mb-1">
                    Senha
                </label>
                <input
                    type="password"
                    name="password"
                    placeholder="Mínimo 8 caracteres"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    required
                >
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium text-gray-900 mb-1">
                    Confirmar Senha
                </label>
                <input
                    type="password"
                    name="confirm_password"
                    placeholder="Confirme sua senha"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    required
                >
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition"
            >
                Registrar
            </button>
        </form>

        <!-- Divider -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">ou</span>
            </div>
        </div>

        <!-- Login Link -->
        <div class="text-center">
            <p class="text-gray-600 text-sm mb-1">Já tem conta?</p>
            <a href="/login/" class="text-blue-600 hover:text-blue-700 font-medium text-sm">
                Faça login aqui
            </a>
        </div>
    </div>
</div>

</body>
</html>
