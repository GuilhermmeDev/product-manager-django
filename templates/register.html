<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

<form method="post" class="bg-white p-8 rounded shadow w-96">
    {% csrf_token %}
    <h1 class="text-2xl font-bold mb-4 text-center">Criar Conta</h1>

    {% if form.errors %}
        <div class="bg-red-100 text-red-700 p-3 rounded mb-4">
            {{ form.errors }}
        </div>
    {% endif %}

    <div class="mb-3">
        <label>Username</label>
        <input type="text" name="username" class="w-full border p-2 rounded">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="w-full border p-2 rounded">
    </div>

    <div class="mb-3">
        <label>Nome</label>
        <input type="text" name="first_name" class="w-full border p-2 rounded">
    </div>

    <div class="mb-3">
        <label>Sobrenome</label>
        <input type="text" name="last_name" class="w-full border p-2 rounded">
    </div>

    <div class="mb-3">
        <label>Senha</label>
        <input type="password" name="password" class="w-full border p-2 rounded">
    </div>

    <div class="mb-3">
        <label>Confirmar senha</label>
        <input type="password" name="confirm_password" class="w-full border p-2 rounded">
    </div>

    <button class="bg-green-500 text-white w-full py-2 rounded mt-4">
        Registrar
    </button>

    <p class="text-center mt-4">
        Já tem conta?
        <a href="/login/" class="text-blue-500">Login</a>
    </p>
</form>

</body>
</html>
