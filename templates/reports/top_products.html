{% extends 'base.html' %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">Top Products</h1>

<table class="w-full bg-white rounded shadow">
    <thead class="bg-gray-200">
        <tr>
            <th class="p-3">Product</th>
            <th class="p-3">Quantity Sold</th>
        </tr>
    </thead>
    <tbody>
        {% for p in products %}
        <tr class="border-t">
            <td class="p-3">{{ p.product__name }}</td>
            <td class="p-3">{{ p.total_sold }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
