{% extends 'base.html' %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">New Sale</h1>

<form method="post" class="bg-white p-6 rounded shadow">
    {% csrf_token %}

    <div id="items">
        <div class="flex gap-4 mb-2">
            <select name="product" class="border p-2">
                {% for product in products %}
                <option value="{{ product.id }}">
                    {{ product.name }} ({{ product.quantity }} in stock)
                </option>
                {% endfor %}
            </select>

            <input type="number" name="quantity" placeholder="Quantity" class="border p-2">
        </div>
    </div>

    <button type="submit" class="bg-blue-500 text-white px-4 py-2 mt-4">
        Create Sale
    </button>
</form>
{% endblock %}
