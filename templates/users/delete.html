{% extends 'base.html' %}

{% block title %}Deletar Usuário — FlowCRM{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Confirmar exclusão</h1>
        <p>Tem certeza que deseja deletar este usuário? Essa ação não pode ser desfeita.</p>
    </div>
</div>

<div class="form-card">
    <div class="form-group">
        <label class="form-label">Usuário</label>
        <div class="badge">{{ object.username }} ({{ object.email }})</div>
    </div>

    <div class="form-footer" style="justify-content: flex-start; gap: 0.75rem; margin-top: 0;">
        <a href="/users/" class="btn-secondary">Cancelar</a>
        <form method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Deletar usuário</button>
        </form>
    </div>
</div>
{% endblock %}
